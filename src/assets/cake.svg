<svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Rice gradient -->
    <linearGradient id="riceGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#f1f1ec"></stop>
    </linearGradient>

    <!-- Salmon -->
    <linearGradient id="salmonGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff8b73"></stop>
      <stop offset="100%" stop-color="#ff6a55"></stop>
    </linearGradient>

    <!-- Tuna -->
    <linearGradient id="tunaGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#d14a5c"></stop>
      <stop offset="100%" stop-color="#b4374a"></stop>
    </linearGradient>

    <!-- Uni -->
    <linearGradient id="uniGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffc04d"></stop>
      <stop offset="100%" stop-color="#ff9f1a"></stop>
    </linearGradient>

    <!-- Plate -->
    <radialGradient id="plateGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#e3e3e3"></stop>
    </radialGradient>

    <!-- Rice texture -->
    <pattern id="riceTexture" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#e9e9e3"></circle>
      <circle cx="6" cy="4" r="0.7" fill="#e9e9e3"></circle>
      <circle cx="3" cy="6" r="0.7" fill="#e9e9e3"></circle>
    </pattern>

  </defs>

  <!-- Plate -->
  <ellipse cx="260" cy="360" rx="200" ry="40" fill="url(#plateGrad)"></ellipse>

  <!-- Bottom rice -->
  <ellipse cx="260" cy="310" rx="160" ry="45" fill="url(#riceGrad)"></ellipse>
  <rect x="100" y="235" width="320" height="75" fill="url(#riceGrad)"></rect>
  <rect x="100" y="235" width="320" height="75" fill="url(#riceTexture)" opacity="0.4"></rect>
  <ellipse cx="260" cy="235" rx="160" ry="45" fill="url(#riceGrad)"></ellipse>

  <!-- Nori wrap -->
  <rect x="100" y="260" width="320" height="35" fill="#1f2c26"></rect>

  <!-- Salmon layer -->
  <ellipse cx="260" cy="235" rx="120" ry="34" fill="url(#salmonGrad)"></ellipse>
  <rect x="140" y="190" width="240" height="45" fill="url(#salmonGrad)"></rect>
  <ellipse cx="260" cy="190" rx="120" ry="34" fill="#ff9b82"></ellipse>

  <!-- Tuna layer -->
  <ellipse cx="260" cy="190" rx="90" ry="26" fill="url(#tunaGrad)"></ellipse>
  <rect x="170" y="155" width="180" height="35" fill="url(#tunaGrad)"></rect>
  <ellipse cx="260" cy="155" rx="90" ry="26" fill="#d95c6d"></ellipse>

  <!-- Top rice -->
  <ellipse cx="260" cy="155" rx="100" ry="28" fill="url(#riceGrad)"></ellipse>
  <ellipse cx="260" cy="155" rx="100" ry="28" fill="url(#riceTexture)" opacity="0.5"></ellipse>

  <!-- Uni topping -->
  <ellipse cx="210" cy="145" rx="20" ry="11" fill="url(#uniGrad)"></ellipse>
  <ellipse cx="235" cy="140" rx="20" ry="11" fill="url(#uniGrad)"></ellipse>
  <ellipse cx="260" cy="145" rx="20" ry="11" fill="url(#uniGrad)"></ellipse>
  <ellipse cx="285" cy="140" rx="20" ry="11" fill="url(#uniGrad)"></ellipse>
  <ellipse cx="310" cy="145" rx="20" ry="11" fill="url(#uniGrad)"></ellipse>

  <!-- Ikura -->
  <circle cx="240" cy="135" r="4" fill="#ff6b4a"></circle>
  <circle cx="246" cy="133" r="4" fill="#ff6b4a"></circle>
  <circle cx="252" cy="136" r="4" fill="#ff6b4a"></circle>

  <!-- Sesame -->
  <ellipse cx="295" cy="135" rx="1.5" ry="2" fill="#f5e6b8"></ellipse>
  <ellipse cx="302" cy="138" rx="1.5" ry="2" fill="#f5e6b8"></ellipse>
  <ellipse cx="308" cy="134" rx="1.5" ry="2" fill="#f5e6b8"></ellipse>

  <!-- Candles -->
  <rect x="245" y="100" width="10" height="45" fill="#7fb3ff"></rect>
  <rect x="265" y="100" width="10" height="45" fill="#ffc07a"></rect>

  <!-- Candle flames -->
  <ellipse cx="250" cy="95" rx="6" ry="10" fill="#ffd966"></ellipse>
  <ellipse cx="270" cy="95" rx="6" ry="10" fill="#ffd966"></ellipse>

</svg>